<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nelson Pro | Engenharia de Cinema</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #0a0a0a; color: white; padding: 20px; }
        .header-nelson { 
            display: flex; justify-content: space-between; align-items: center; 
            background: #141414; padding: 15px 30px; 
            border-bottom: 3px solid #e50914; position: sticky; top: 0; z-index: 1000;
        }
        .header-nelson h1 { color: #e50914; font-size: 22px; }
        .btn-sair { background: #e50914; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .container { max-width: 1000px; margin: 40px auto; }
        .pilar-card { background: #161616; padding: 20px; border-radius: 12px; border: 1px solid #222; margin-bottom: 20px; border-left: 5px solid #e50914; }
        .pilar-card h3 { color: #e50914; margin-bottom: 10px; }
        .passos { font-size: 14px; color: #aaa; list-style: none; padding-left: 10px; }
        .passos li::before { content: "• "; color: #e50914; }
    </style>
</head>
<body>

    <header class="header-nelson">
        <h1>NELSON PRO | <span style="color:#fff; font-weight:100;">ENGENHARIA</span></h1>
        <button class="btn-sair" onclick="sair()">SAIR</button>
    </header>

    <div class="container">
        <h2 style="margin-bottom: 20px;">Olá, <span id="user-name">Especialista</span></h2>
        <div id="grid-container"></div>
    </div>

    <script>
        // ✅ CORREÇÃO DO LOOP: Só redireciona se REALMENTE não houver usuário
        const usuarioLogado = localStorage.getItem('user');
        
        if (!usuarioLogado) {
            // Se não tiver login, manda de volta para a página de login
            window.location.replace("login.html");
        } else {
            // Se tiver, mostra o nome
            const user = JSON.parse(usuarioLogado);
            document.getElementById('user-name').innerText = user.name;
        }

        function sair() {
            localStorage.removeItem('user');
            window.location.replace("login.html");
        }

        // 📊 SEUS 8 PILARES ESTÃO AQUI (PROTEGIDOS)
        const PILARES = [
            { n: 1, t: "INGEST", e: "📥", p: ["Storage GDC", "Espaço 25%", "Satélite"] },
            { n: 2, t: "PRÉ-MONTAGEM", e: "🎬", p: ["CPL Correta", "Trailers", "Áudio 5.1"] },
            { n: 3, t: "KDM (CHAVES)", e: "🔑", p: ["Data Início", "Certificado", "Ingest GDC"] },
            { n: 4, t: "AUTOMAÇÃO", e: "⚙️", p: ["Macros Luz", "Máscara Tela", "Muting"] },
            { n: 5, t: "PLAYLIST (SPL)", e: "📋", p: ["Comandos", "Tempo Total", "Flat/Scope"] },
            { n: 6, t: "PROJEÇÃO (LENTE)", e: "🔦", p: ["Foco Remoto", "Convergência", "Lâmpada/Laser"] },
            { n: 7, t: "ÁUDIO", e: "🔊", p: ["Canais L/C/R", "Fader 7.0", "CP750/850"] },
            { n: 8, t: "CHECK-LIST", e: "✅", p: ["Temperatura", "Ventoinhas", "Logs Erro"] }
        ];

        const container = document.getElementById('grid-container');
        PILARES.forEach(p => {
            container.innerHTML += `
                <div class="pilar-card">
                    <h3>${p.e} ${p.n}. ${p.t}</h3>
                    <ul class="passos">${p.p.map(step => `<li>${step}</li>`).join('')}</ul>
                </div>
            `;
        });
    </script>
</body>
</html>
