<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nelson Pro | Cinema Platform</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Exo+2:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root { --neon-red: #e50914; --dark: #050505; --glass: rgba(255, 255, 255, 0.05); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Exo 2', sans-serif; }
        body { background: var(--dark); color: white; height: 100vh; display: flex; justify-content: center; align-items: center; }
        
        .container { background: var(--glass); padding: 40px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(15px); width: 100%; max-width: 400px; text-align: center; }
        .logo { font-family: 'Orbitron'; color: var(--neon-red); font-size: 28px; margin-bottom: 20px; text-shadow: 0 0 10px rgba(229,9,20,0.5); }
        
        input { width: 100%; padding: 15px; margin-bottom: 15px; background: rgba(0,0,0,0.6); border: 1px solid #333; border-radius: 8px; color: white; }
        input:focus { border-color: var(--neon-red); outline: none; }
        
        .btn { width: 100%; padding: 15px; background: var(--neon-red); border: none; border-radius: 8px; color: white; font-weight: bold; font-family: 'Orbitron'; cursor: pointer; transition: 0.3s; }
        .btn:hover { background: #ff0d1a; transform: scale(1.02); }
        
        .toggle-link { margin-top: 20px; font-size: 14px; color: #888; cursor: pointer; text-decoration: underline; }
    </style>
</head>
<body>

    <div class="container" id="box-login">
        <div class="logo">NELSON PRO</div>
        <p style="margin-bottom: 25px; color: #aaa;">ACESSAR CABINE TÉCNICA</p>
        <input type="email" id="login-email" placeholder="E-mail Profissional">
        <input type="password" id="login-pass" placeholder="Senha">
        <button class="btn" onclick="fazerLogin()">INICIAR SESSÃO</button>
        <div class="toggle-link" onclick="toggleForm()">Novo Operador? Criar Conta</div>
    </div>

    <div class="container" id="box-cadastro" style="display: none;">
        <div class="logo">NELSON PRO</div>
        <p style="margin-bottom: 25px; color: #aaa;">INGEST DE NOVO OPERADOR</p>
        <input type="text" id="reg-nome" placeholder="Nome Completo">
        <input type="email" id="reg-email" placeholder="E-mail">
        <input type="password" id="reg-pass" placeholder="Senha">
        <button class="btn" onclick="fazerCadastro()">EFETUAR CADASTRO</button>
        <div class="toggle-link" onclick="toggleForm()">Já tenho acesso? Fazer Login</div>
    </div>

    <script>
        function toggleForm() {
            const login = document.getElementById('box-login');
            const cadastro = document.getElementById('box-cadastro');
            login.style.display = login.style.display === 'none' ? 'block' : 'none';
            cadastro.style.display = cadastro.style.display === 'none' ? 'block' : 'none';
        }

        async function fazerLogin() {
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-pass').value;

            const res = await fetch('/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });

            const data = await res.json();
            if (data.success) {
                localStorage.setItem('user', JSON.stringify(data.user));
                window.location.href = 'dashboard.html';
            } else {
                alert("❌ Erro: KDM Inválido ou Usuário não encontrado!");
            }
        }

        async function fazerCadastro() {
            const name = document.getElementById('reg-nome').value;
            const email = document.getElementById('reg-email').value;
            const password = document.getElementById('reg-pass').value;

            const res = await fetch('/api/auth/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, email, password })
            });

            if (res.ok) {
                alert("✅ Cadastro realizado! Faça o login agora.");
                toggleForm();
            } else {
                alert("❌ Erro ao cadastrar. Tente outro e-mail.");
            }
        }
    </script>
</body>
</html>
