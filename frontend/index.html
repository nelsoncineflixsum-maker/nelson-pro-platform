<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nelson Pro | Cinema Engineering</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Exo+2:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root { --neon-blue: #00d4ff; --neon-purple: #bc13fe; --cinema-red: #e50914; --dark-bg: #050505; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Exo 2', sans-serif; }
        body { background: var(--dark-bg); color: white; overflow-x: hidden; }

        /* Background Animado */
        .bg-glow { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at 50% 50%, #1a0b2e 0%, #050505 100%); z-index: -1; }

        /* Navbar Master */
        nav { display: flex; justify-content: space-between; padding: 20px 50px; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,255,255,0.1); position: sticky; top: 0; z-index: 100; }
        .logo { font-family: 'Orbitron', sans-serif; font-weight: 900; color: var(--cinema-red); font-size: 24px; text-shadow: 0 0 10px rgba(229, 9, 20, 0.5); }

        /* Hero Section */
        .hero { height: 80vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 0 20px; }
        .hero h1 { font-family: 'Orbitron', sans-serif; font-size: 3.5rem; margin-bottom: 20px; background: linear-gradient(to right, #fff, var(--neon-blue)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .hero p { font-size: 1.2rem; color: #aaa; max-width: 700px; margin-bottom: 40px; }

        /* Form Glassmorphism */
        .auth-card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); padding: 40px; border-radius: 20px; backdrop-filter: blur(20px); width: 100%; max-width: 400px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        input { width: 100%; padding: 15px; margin-bottom: 15px; background: rgba(0,0,0,0.5); border: 1px solid #333; border-radius: 10px; color: white; transition: 0.3s; }
        input:focus { border-color: var(--neon-blue); box-shadow: 0 0 15px rgba(0, 212, 255, 0.2); outline: none; }
        .btn-main { width: 100%; padding: 15px; background: var(--cinema-red); color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; text-transform: uppercase; letter-spacing: 2px; transition: 0.4s; }
        .btn-main:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(229, 9, 20, 0.4); background: #ff0d1a; }
    </style>
</head>
<body>
    <div class="bg-glow"></div>
    <nav>
        <div class="logo">NELSON PRO</div>
        <div class="menu">PLATAFORMA DE ENGENHARIA 4K</div>
    </nav>

    <section class="hero">
        <h1>DOMINE A CABINE</h1>
        <p>Aprenda projeção digital, servidores GDC, automação e operação real de cinema com o Gerente Nelson Jesus.</p>
        
        <div class="auth-card">
            <h3 style="margin-bottom: 25px; font-family: 'Orbitron';">ACESSAR SISTEMA</h3>
            <input type="email" id="login-email" placeholder="📧 Seu Email Profissional">
            <input type="password" id="login-pass" placeholder="🔒 Senha de Segurança">
            <button class="btn-main" onclick="fazerLogin()">Iniciar Projeção</button>
            <p style="margin-top: 20px; font-size: 14px; color: #666;">Acesso restrito a operadores autorizados.</p>
        </div>
    </section>

    <script>
        async function fazerLogin() {
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-pass').value;

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();
                if (data.success) {
                    localStorage.setItem('user', JSON.stringify(data.user));
                    // Manda para o dashboard.html (A nova cabine)
                    window.location.href = 'dashboard.html';
                } else {
                    alert("❌ KDM INVÁLIDO: Verifique e-mail e senha.");
                }
            } catch (err) {
                alert("🔴 Erro de Conexão com o Servidor.");
            }
        }
    </script>
</body>
</html>
