<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nelson Pro | Engenharia de Cinema 4K</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body { background: #0a0a0a; color: white; padding: 20px; line-height: 1.6; }
        
        /* HEADER FIXO */
        .header-nelson { 
            display: flex; justify-content: space-between; align-items: center; 
            background: rgba(20, 20, 20, 0.95); padding: 15px 30px; 
            border-bottom: 3px solid #e50914; position: sticky; top: 0; z-index: 1000;
            backdrop-filter: blur(10px);
        }
        .header-nelson h1 { color: #e50914; font-size: 22px; letter-spacing: 2px; }
        
        .btn-sair { 
            background: #e50914; color: white; border: none; padding: 10px 25px; 
            border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.3s;
        }
        .btn-sair:hover { background: #b20710; transform: scale(1.05); }

        .container { max-width: 1000px; margin: 40px auto; }
        
        .welcome-msg { margin-bottom: 30px; border-left: 5px solid #e50914; padding-left: 15px; }
        .welcome-msg h2 { font-size: 28px; }

        /* GRID DOS PILARES */
        .grid-pilares { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        
        .pilar-card { 
            background: #161616; padding: 25px; border-radius: 12px; 
            border: 1px solid #222; transition: 0.3s;
        }
        .pilar-card:hover { border-color: #e50914; transform: translateY(-5px); background: #1c1c1c; }
        .pilar-card h3 { color: #e50914; margin-bottom: 10px; display: flex; align-items: center; gap: 10px; }
        .pilar-card p { color: #aaa; font-size: 14px; margin-bottom: 15px; }
        
        .passos-lista { font-size: 13px; color: #eee; list-style: none; }
        .passos-lista li { margin-bottom: 8px; display: flex; align-items: flex-start; gap: 8px; }
        .passos-lista li::before { content: "✔"; color: #e50914; font-weight: bold; }
    </style>
</head>
<body>

    <header class="header-nelson">
        <h1>NELSON PRO <span style="color:#fff; font-weight:100;">| SIMULADOR</span></h1>
        <button class="btn-sair" onclick="sair()">ENCERRAR SESSÃO</button>
    </header>

    <div class="container">
        <div class="welcome-msg">
            <h2>Olá, <span id="user-name" style="color: #e50914;">Especialista</span></h2>
            <p>Painel de Controle: Simulador dos 8 Pilares da Projeção Digital Cinema.</p>
        </div>

        <div id="grid-container" class="grid-pilares">
            </div>
    </div>

    <script>
        // 🔒 SEGURANÇA MÁXIMA: Se não logou, volta pro início
        if (!localStorage.getItem('user')) {
            window.location.href = '/'; 
        }

        // Mostra o nome do aluno logado
        const user = JSON.parse(localStorage.getItem('user'));
        if(user) document.getElementById('user-name').innerText = user.name;

        // 🚪 FUNÇÃO SAIR (CORRIGIDA PARA NÃO DAR TELA BRANCA)
        function sair() {
            localStorage.removeItem('user');
            window.location.href = '/'; 
        }

        // 📊 OS 8 PILARES DA ENGENHARIA NELSON PRO
        const PILARES = [
            { n: 1, t: "INGEST", e: "📥", d: "Entrada do arquivo digital (DCP) no servidor.", p: ["Verificar storage no GDC", "Espaço livre mín. 25%", "Check via Satélite"] },
            { n: 2, t: "PRÉ-MONTAGEM", e: "🎬", d: "Organização da playlist e trailers.", p: ["Importar CPL correta", "Ajustar ordem dos trailers", "Check de áudio 5.1/7.1"] },
            { n: 3, t: "KDM (CHAVES)", e: "🔑", d: "Liberação de exibição criptografada.", p: ["Validar data de início", "Check de certificado do servidor", "Ingest da chave no GDC"] },
            { n: 4, t: "AUTOMAÇÃO", e: "⚙️", d: "Comandos de som, luz e cortinas.", p: ["Macro de luz (In/Out)", "Abertura de máscara de tela", "Muting do som no início"] },
            { n: 5, t: "PLAYLIST (SPL)", e: "📋", d: "Montagem final da sessão programada.", p: ["Inserir comandos de automação", "Check de tempo total", "Validar formato Flat/Scope"] },
            { n: 6, t: "PROJEÇÃO (LENTE)", e: "🔦", d: "Foco, enquadramento e brilho (Footlamberts).", p: ["Ajuste de foco remoto", "Check de convergência", "Brilho da lâmpada/Laser"] },
            { n: 7, t: "ÁUDIO (PROCESSADOR)", e: "🔊", d: "Calibração de níveis e canais.", p: ["Teste de canais L/C/R", "Nível de fader (padrão 7.0)", "Check de processador CP750/850"] },
            { n: 8, t: "CHECK-LIST FINAL", e: "✅", d: "Monitoramento em tempo real da sessão.", p: ["Monitorar temperatura", "Status da ventoinha", "Log de erros do servidor"] }
        ];

        const container = document.getElementById('grid-container');
        PILARES.forEach(p => {
            container.innerHTML += `
                <div class="pilar-card">
                    <h3>${p.e} ${p.n}. ${p.t}</h3>
                    <p>${p.d}</p>
                    <ul class="passos-lista">
                        ${p.p.map(passo => `<li>${passo}</li>`).join('')}
                    </ul>
                </div>
            `;
        });
    </script>
</body>
</html>
