<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Nelson Pro | Login</title>
    <style>
        body { background: #050505; color: white; font-family: sans-serif; height: 100vh; display: flex; justify-content: center; align-items: center; margin: 0; }
        .card { background: #111; padding: 40px; border-radius: 15px; border-top: 4px solid #e50914; width: 320px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid #333; color: white; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #e50914; border: none; color: white; font-weight: bold; cursor: pointer; border-radius: 5px; width: 100%; margin-top: 10px; }
        .link { color: #888; font-size: 13px; margin-top: 15px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <h2 style="color:#e50914">LOGIN</h2>
        <input type="email" id="email" placeholder="Seu E-mail">
        <input type="password" id="pass" placeholder="Sua Senha">
        <button onclick="logar()">ACESSAR CABINE</button>
        <div class="link" onclick="window.location.href='cadastro.html'">Criar nova conta de aluno</div>
    </div>
    <script>
        async function logar() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('pass').value;
            const res = await fetch('/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });
            const data = await res.json();
            if (data.success) {
                localStorage.setItem('user', JSON.stringify(data.user));
                window.location.href = 'dashboard.html';
            } else { alert('Erro: Verifique seus dados.'); }
        }
    </script>
</body>
</html>
