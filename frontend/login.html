<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nelson Pro | Login 4K</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { 
            background: radial-gradient(circle, #232323 0%, #000000 100%); 
            height: 100vh; display: flex; justify-content: center; align-items: center; 
        }
        .login-box { 
            background: rgba(255, 255, 255, 0.05); 
            backdrop-filter: blur(15px); 
            padding: 50px; border-radius: 20px; 
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 400px; text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }
        .logo-nelson { color: #e50914; font-size: 28px; font-weight: 900; letter-spacing: 2px; margin-bottom: 5px; }
        .sub-logo { color: #fff; font-size: 12px; letter-spacing: 4px; margin-bottom: 30px; opacity: 0.7; }
        input { 
            width: 100%; padding: 15px; margin-bottom: 20px; 
            background: rgba(0,0,0,0.3); border: 1px solid #444; 
            border-radius: 8px; color: white; transition: 0.3s;
        }
        input:focus { border-color: #e50914; box-shadow: 0 0 10px rgba(229, 9, 20, 0.3); outline: none; }
        button { 
            width: 100%; padding: 15px; background: #e50914; color: white; 
            border: none; border-radius: 8px; font-weight: bold; cursor: pointer; 
            text-transform: uppercase; transition: 0.4s;
        }
        button:hover { background: #ff0d1a; transform: translateY(-2px); box-shadow: 0 10px 20px rgba(229, 9, 20, 0.4); }
        .footer { margin-top: 25px; color: #888; font-size: 14px; }
        .footer span { color: #e50914; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div class="login-box">
        <div class="logo-nelson">NELSON PRO</div>
        <div class="sub-logo">ENGINEERING 4K</div>
        <input type="email" id="email" placeholder="E-mail de Engenharia">
        <input type="password" id="password" placeholder="Senha de Acesso">
        <button onclick="logar()">Iniciar Projeção</button>
        <div class="footer">Novo aluno? <span onclick="window.location.href='cadastro.html'">Criar Conta</span></div>
    </div>

    <script>
        async function logar() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const response = await fetch('/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });
            const data = await response.json();
            if (data.success) {
                localStorage.setItem('user', JSON.stringify(data.user));
                window.location.href = 'index.html';
            } else { alert('Erro: Acesso não autorizado!'); }
        }
    </script>
</body>
</html>
