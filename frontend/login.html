<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Nelson Pro | Login</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { background: #111; padding: 40px; border-radius: 10px; border-top: 5px solid #e50914; text-align: center; width: 300px; }
        input { width: 100%; padding: 10px; margin: 10px 0; background: #222; border: 1px solid #444; color: #fff; }
        button { width: 100%; padding: 10px; background: #e50914; border: none; color: #fff; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div class="box">
        <h2 style="color:#e50914">NELSON PRO</h2>
        <input type="email" id="email" placeholder="E-mail">
        <input type="password" id="pass" placeholder="Senha">
        <button onclick="logar()">ENTRAR</button>
        <p style="font-size:12px; margin-top:15px; cursor:pointer; color:#888" onclick="window.location.href='cadastro.html'">Criar conta</p>
    </div>
    <script>
        async function logar() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('pass').value;
            const res = await fetch('/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });
            const data = await res.json();
            if (data.success) {
                localStorage.setItem('user', JSON.stringify(data.user));
                window.location.href = 'index.html';
            } else { alert('Erro no login!'); }
        }
    </script>
</body>
</html>
