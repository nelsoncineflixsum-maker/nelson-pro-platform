<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Nelson Pro - Login Engenharia</title>
    <style>
        body { background: #1a1a1a; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: #2a2a2a; padding: 40px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 350px; text-align: center; border-top: 5px solid #e50914; }
        h2 { color: #e50914; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 5px; border: none; background: #3a3a3a; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #e50914; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        button:hover { background: #b20710; }
        .link { margin-top: 15px; font-size: 14px; color: #aaa; cursor: pointer; }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>NELSON PRO</h2>
        <p>Acesse sua conta de Engenharia</p>
        <input type="email" id="email" placeholder="Seu E-mail">
        <input type="password" id="password" placeholder="Sua Senha">
        <button onclick="logar()">ENTRAR NO SISTEMA</button>
        <div class="link" onclick="window.location.href='cadastro.html'">Criar conta nova</div>
    </div>

    <script>
        async function logar() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            const response = await fetch('/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });

            const data = await response.json();
            if (data.success) {
                localStorage.setItem('user', JSON.stringify(data.user)); // ✅ Salva o login
                window.location.href = 'index.html'; // ✅ Vai para o simulador
            } else {
                alert('Acesso negado: Verifique seus dados!');
            }
        }
    </script>
</body>
</html>
