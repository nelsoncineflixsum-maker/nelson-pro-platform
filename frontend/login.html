<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Nelson Pro | Login Cabine</title>
    <style>
        :root { --neon-red: #e50914; --dark: #0a0a0a; }
        body { background: var(--dark); color: white; font-family: 'Segoe UI', sans-serif; height: 100vh; display: flex; justify-content: center; align-items: center; margin: 0; }
        .glass-card { 
            background: rgba(255, 255, 255, 0.03); 
            padding: 45px; 
            border-radius: 20px; 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            backdrop-filter: blur(15px);
            width: 350px; 
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }
        h2 { font-size: 28px; letter-spacing: 2px; color: var(--neon-red); margin-bottom: 30px; text-transform: uppercase; }
        input { 
            width: 100%; padding: 14px; margin: 12px 0; 
            background: rgba(0,0,0,0.5); border: 1px solid #333; 
            color: white; border-radius: 8px; box-sizing: border-box;
            transition: 0.3s;
        }
        input:focus { border-color: var(--neon-red); outline: none; box-shadow: 0 0 10px rgba(229, 9, 20, 0.3); }
        button { 
            width: 100%; padding: 14px; background: var(--neon-red); 
            border: none; color: white; font-weight: bold; cursor: pointer; 
            border-radius: 8px; margin-top: 20px; font-size: 16px;
            transition: 0.4s;
        }
        button:hover { transform: scale(1.02); background: #ff0d1a; box-shadow: 0 0 20px rgba(229, 9, 20, 0.4); }
        .link { color: #888; font-size: 13px; margin-top: 20px; cursor: pointer; display: block; }
        .link:hover { color: white; }
    </style>
</head>
<body>
    <div class="glass-card">
        <h2>Nelson Pro</h2>
        <p style="color: #666; font-size: 12px; margin-bottom: 20px;">ACESSO AO SERVIDOR DE PROJEÇÃO</p>
        <input type="email" id="email" placeholder="E-mail do Operador">
        <input type="password" id="pass" placeholder="Senha Master">
        <button onclick="logar()">INICIAR SESSÃO</button>
        <span class="link" onclick="window.location.href='cadastro.html'">Solicitar Novo Acesso (Cadastro)</span>
    </div>

    <script>
        async function logar() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('pass').value;
            const res = await fetch('/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });
            const data = await res.json();
            if (data.success) {
                localStorage.setItem('user', JSON.stringify(data.user));
                window.location.href = 'dashboard.html';
            } else { alert('❌ Erro: Credenciais não autorizadas no servidor.'); }
        }
    </script>
</body>
</html>
