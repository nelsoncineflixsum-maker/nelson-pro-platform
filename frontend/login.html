<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cinema Pro Platform — Login Profissional</title>
  <style>
    /* ===== RESET & BASE ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold:    #f5c518;
      --gold-dk: #c9a10e;
      --dark:    #0a0a0f;
      --dark2:   #111118;
      --dark3:   #1a1a24;
      --card:    #16161f;
      --border:  #2a2a3a;
      --text:    #e8e8f0;
      --muted:   #8888aa;
      --red:     #e74c3c;
      --green:   #2ecc71;
      --cyan:    #1abc9c;
    }

    html, body {
      height: 100%;
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--dark);
      color: var(--text);
    }

    /* ===== BACKGROUND CINEMATOGRÁFICO ===== */
    body {
      background:
        radial-gradient(ellipse 100% 80% at 50% 0%, rgba(245,197,24,.12) 0%, transparent 70%),
        radial-gradient(ellipse 80% 50% at 80% 100%, rgba(26,188,156,.08) 0%, transparent 60%),
        var(--dark);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ===== HEADER ===== */
    header {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem 2rem;
      border-bottom: 1px solid var(--border);
      background: rgba(10,10,15,.9);
      backdrop-filter: blur(15px);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: .75rem;
      text-decoration: none;
    }

    .logo-icon {
      width: 46px; height: 46px;
      background: linear-gradient(135deg, var(--gold), #ffd84d);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.5rem;
      box-shadow: 0 0 25px rgba(245,197,24,.4);
    }

    .logo-text { font-size: 1.35rem; font-weight: 800; color: var(--text); letter-spacing: -.5px; }
    .logo-text span { color: var(--gold); }

    /* ===== MAIN WRAPPER ===== */
    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem 1.5rem;
    }

    /* ===== LOGIN CARD ===== */
    .login-wrapper {
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .login-heading {
      text-align: center;
    }

    .login-heading h1 {
      font-size: 2rem;
      font-weight: 900;
      margin-bottom: .6rem;
      letter-spacing: -.02em;
    }

    .login-heading p {
      color: var(--muted);
      font-size: .95rem;
      line-height: 1.6;
    }

    .login-card {
      background: linear-gradient(135deg, var(--card) 0%, #1e1e2a 100%);
      border: 1.5px solid var(--border);
      border-radius: 18px;
      padding: 2.5rem 2.2rem;
      box-shadow: 0 20px 60px rgba(0,0,0,.5), 0 0 0 1px rgba(245,197,24,.08);
      backdrop-filter: blur(10px);
    }

    /* ===== FORM ===== */
    .form-group {
      display: flex;
      flex-direction: column;
      gap: .5rem;
      margin-bottom: 1.5rem;
    }

    .form-group label {
      font-size: .85rem;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .08em;
    }

    .input-wrap {
      position: relative;
    }

    .input-wrap .icon {
      position: absolute;
      left: 1.2rem;
      top: 50%;
      transform: translateY(-50%);
      font-size: 1.1rem;
      color: var(--muted);
      pointer-events: none;
      transition: color .2s;
    }

    .form-group input {
      width: 100%;
      background: var(--dark3);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 1rem 1.2rem 1rem 3.2rem;
      color: var(--text);
      font-size: .95rem;
      transition: all .3s;
      outline: none;
    }

    .form-group input:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 4px rgba(245,197,24,.15);
      background: rgba(245,197,24,.02);
    }

    .form-group input::placeholder { color: var(--muted); }

    /* ===== FORGOT PASSWORD ===== */
    .forgot-row {
      display: flex;
      justify-content: flex-end;
      margin-top: -.8rem;
      margin-bottom: 1.5rem;
    }

    .forgot-row a {
      font-size: .82rem;
      color: var(--gold);
      text-decoration: none;
      font-weight: 600;
      transition: all .2s;
    }

    .forgot-row a:hover {
      color: #ffd84d;
      text-decoration: underline;
    }

    /* ===== REMEMBER ME ===== */
    .remember-row {
      display: flex;
      align-items: center;
      gap: .6rem;
      margin-bottom: 1.5rem;
      font-size: .9rem;
    }

    .remember-row input[type="checkbox"] {
      width: 18px;
      height: 18px;
      cursor: pointer;
      accent-color: var(--gold);
    }

    .remember-row label {
      color: var(--muted);
      cursor: pointer;
    }

    /* ===== BUTTON ===== */
    .btn-login {
      width: 100%;
      padding: 1rem;
      background: linear-gradient(135deg, var(--gold), var(--gold-dk));
      color: #000;
      font-size: 1rem;
      font-weight: 800;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      letter-spacing: .04em;
      transition: all .3s;
      box-shadow: 0 8px 25px rgba(245,197,24,.35);
      text-transform: uppercase;
    }

    .btn-login:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 12px 35px rgba(245,197,24,.5);
    }

    .btn-login:active:not(:disabled) { transform: translateY(0); }

    .btn-login:disabled {
      opacity: .7;
      cursor: not-allowed;
    }

    /* ===== DIVIDER ===== */
    .divider {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin: 2rem 0;
      color: var(--muted);
      font-size: .8rem;
    }

    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ===== REGISTER LINK ===== */
    .register-row {
      text-align: center;
      font-size: .9rem;
      color: var(--muted);
    }

    .register-row a {
      color: var(--gold);
      font-weight: 700;
      text-decoration: none;
      transition: all .2s;
    }

    .register-row a:hover {
      color: #ffd84d;
      text-decoration: underline;
    }

    /* ===== SECURITY BADGE ===== */
    .security-badge {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: .6rem;
      font-size: .8rem;
      color: var(--green);
      margin-top: 1rem;
      font-weight: 600;
    }

    /* ===== BACK LINK ===== */
    .back-link {
      text-align: center;
    }

    .back-link a {
      color: var(--muted);
      font-size: .85rem;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: .4rem;
      transition: all .2s;
      font-weight: 600;
    }

    .back-link a:hover {
      color: var(--gold);
      transform: translateX(-4px);
    }

    /* ===== FOOTER ===== */
    footer {
      text-align: center;
      padding: 1.5rem;
      color: var(--muted);
      font-size: .78rem;
      border-top: 1px solid var(--border);
    }

    /* ===== ALERT ===== */
    .alert {
      padding: .8rem 1.2rem;
      border-radius: 12px;
      font-size: .85rem;
      margin-bottom: 1rem;
      display: none;
      align-items: center;
      gap: .6rem;
      font-weight: 600;
    }

    .alert.show { display: flex; }

    .alert.error {
      background: rgba(231,76,60,.15);
      border: 1px solid rgba(231,76,60,.3);
      color: var(--red);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 480px) {
      .login-card { padding: 1.8rem 1.5rem; }
      .login-heading h1 { font-size: 1.6rem; }
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header>
    <a href="index.html" class="logo">
      <div class="logo-icon">🎬</div>
      <span class="logo-text">Cinema <span>Pro</span></span>
    </a>
  </header>

  <!-- MAIN -->
  <main>
    <div class="login-wrapper">

      <div class="login-heading">
        <h1>Bem-vindo de volta</h1>
        <p>Entre na sua cabine profissional e acesse todo o conteúdo</p>
      </div>

      <div class="login-card">

        <div id="alertBox" class="alert"></div>

        <form id="loginForm" onsubmit="handleLogin(event)">

          <div class="form-group">
            <label for="email">E-mail Profissional</label>
            <div class="input-wrap">
              <span class="icon">✉️</span>
              <input
                type="email"
                id="email"
                name="email"
                placeholder="seu@email.com"
                required
                autocomplete="email"
              />
            </div>
          </div>

          <div class="form-group">
            <label for="password">Senha</label>
            <div class="input-wrap">
              <span class="icon">🔒</span>
              <input
                type="password"
                id="password"
                name="password"
                placeholder="••••••••"
                required
                autocomplete="current-password"
              />
            </div>
          </div>

          <div class="remember-row">
            <input type="checkbox" id="remember" name="remember" />
            <label for="remember">Lembrar-me neste dispositivo</label>
          </div>

          <div class="forgot-row">
            <a href="#">Esqueci minha senha</a>
          </div>

          <button type="submit" class="btn-login" id="submitBtn">
            ▶ Entrar na Plataforma
          </button>

          <div class="security-badge">
            🔒 Conexão 256-bit criptografada
          </div>

        </form>

        <div class="divider">ou</div>

        <div class="register-row">
          Novo por aqui?
          <a href="cadastro.html">Criar uma conta</a>
        </div>
      </div>

      <div class="back-link">
        <a href="index.html">← Voltar para a página inicial</a>
      </div>

    </div>
  </main>

  <!-- FOOTER -->
  <footer>
    &copy; 2025 Cinema Pro Platform · Todos os direitos reservados
  </footer>

  <script>
    const form = document.getElementById('loginForm');
    const submitBtn = document.getElementById('submitBtn');
    const alertBox = document.getElementById('alertBox');

    function showAlert(message, type) {
      alertBox.textContent = message;
      alertBox.className = `alert ${type} show`;
      setTimeout(() => {
        alertBox.classList.remove('show');
      }, 4000);
    }

    function handleLogin(e) {
      e.preventDefault();

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      if (!email || !password) {
        showAlert('❌ Preencha todos os campos', 'error');
        return;
      }

      submitBtn.textContent = '⏳ Entrando...';
      submitBtn.disabled = true;

      setTimeout(() => {
        submitBtn.textContent = '✅ Acesso liberado!';
        showAlert('✅ Login realizado com sucesso! Redirecionando...', 'success');
        
        setTimeout(() => {
          window.location.href = 'dashboard.html';
        }, 1200);
      }, 1500);
    }
  </script>

</body>
</html>
