<script>
    async function logar() {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;

        // 🚨 Verificação: Não deixa enviar vazio
        if (!email || !password) {
            alert('Nelson, preencha o e-mail e a senha!');
            return;
        }

        try {
            // O segredo está aqui: o caminho tem que ser /api/auth/login
            const response = await fetch('/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });

            const data = await response.json();

            if (data.success) {
                localStorage.setItem('user', JSON.stringify(data.user));
                window.location.href = 'index.html'; // 🚀 Vai para o simulador
            } else {
                alert('Acesso negado: E-mail ou senha incorretos.');
            }
        } catch (err) {
            console.error('Erro de conexão:', err);
            alert('Erro ao conectar com o servidor da Render.');
        }
    }
</script>
