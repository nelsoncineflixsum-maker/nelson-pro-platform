<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nelson Pro - Criar Conta</title>
    <style>
        body { 
            background: #1a1a1a; 
            color: white; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }
        .card { 
            background: #2a2a2a; 
            padding: 40px; 
            border-radius: 15px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
            width: 350px; 
            text-align: center; 
            border-top: 5px solid #e50914; 
        }
        h2 { color: #e50914; margin-bottom: 10px; text-transform: uppercase; }
        p { color: #aaa; font-size: 14px; margin-bottom: 25px; }
        input { 
            width: 100%; 
            padding: 12px; 
            margin: 10px 0; 
            border-radius: 5px; 
            border: 1px solid #444; 
            background: #3a3a3a; 
            color: white; 
            box-sizing: border-box; 
            outline: none;
        }
        input:focus { border-color: #e50914; }
        button { 
            width: 100%; 
            padding: 12px; 
            background: #e50914; 
            color: white; 
            border: none; 
            border-radius: 5px; 
            cursor: pointer; 
            font-weight: bold; 
            margin-top: 15px;
            transition: 0.3s;
        }
        button:hover { background: #b20710; }
        .footer-link { 
            margin-top: 20px; 
            font-size: 14px; 
            color: #888; 
        }
        .footer-link span { 
            color: #e50914; 
            cursor: pointer; 
            text-decoration: underline; 
        }
    </style>
</head>
<body>

    <div class="card">
        <h2>CRIAR CONTA</h2>
        <p>Plataforma de Engenharia Nelson Pro</p>
        
        <input type="text" id="nome" placeholder="Nome Completo">
        <input type="email" id="email" placeholder="Seu melhor E-mail">
        <input type="password" id="senha" placeholder="Crie uma Senha">
        
        <button onclick="cadastrar()">FINALIZAR CADASTRO</button>
        
        <div class="footer-link">
            Já tem uma conta? <span onclick="window.location.href='login.html'">Faça Login</span>
        </div>
    </div>

    <script>
        async function cadastrar() {
            const name = document.getElementById('nome').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('senha').value;

            if (!name || !email || !password) {
                alert("Nelson, preencha todos os campos para o aluno!");
                return;
            }

            try {
                const response = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, password })
                });

                const data = await response.json();

                if (response.ok) {
                    alert('✅ Cadastro realizado com sucesso! Agora você pode entrar.');
                    window.location.href = 'login.html';
                } else {
                    alert('❌ Erro: ' + (data.message || 'E-mail já cadastrado.'));
                }
            } catch (err) {
                console.error(err);
                alert('❌ Erro ao conectar com o servidor da Render.');
            }
        }
    </script>

</body>
</html>
