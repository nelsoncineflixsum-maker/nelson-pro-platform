<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Nelson Pro | Cadastro</title>
    <style>
        body { background: #000; color: white; font-family: sans-serif; height: 100vh; display: flex; justify-content: center; align-items: center; margin: 0; }
        .card { background: #111; padding: 40px; border-radius: 15px; border: 1px solid #222; width: 320px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid #333; color: white; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #fff; color: #000; border: none; font-weight: bold; cursor: pointer; border-radius: 5px; width: 100%; }
    </style>
</head>
<body>
    <div class="card">
        <h2 style="color:#e50914">CADASTRAR</h2>
        <input type="text" id="nome" placeholder="Nome Completo">
        <input type="email" id="email" placeholder="E-mail">
        <input type="password" id="pass" placeholder="Crie uma Senha">
        <button onclick="cadastrar()">FINALIZAR INGEST</button>
        <p style="color:#555; font-size:12px; margin-top:15px; cursor:pointer;" onclick="window.location.href='login.html'">Já tenho conta</p>
    </div>
    <script>
        async function cadastrar() {
            const name = document.getElementById('nome').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('pass').value;
            const res = await fetch('/api/auth/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, email, password })
            });
            if (res.ok) { alert('Sucesso! Bem-vindo ao time, Nelson Pro.'); window.location.href='login.html'; }
            else { alert('Erro no cadastro.'); }
        }
    </script>
</body>
</html>
