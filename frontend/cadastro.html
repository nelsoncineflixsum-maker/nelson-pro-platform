<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cinema Pro Platform — Cadastro Profissional</title>
  <style>
    /* ===== RESET & BASE ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold:    #f5c518;
      --gold-dk: #c9a10e;
      --dark:    #0a0a0f;
      --dark2:   #111118;
      --dark3:   #1a1a24;
      --card:    #16161f;
      --border:  #2a2a3a;
      --text:    #e8e8f0;
      --muted:   #8888aa;
      --red:     #e74c3c;
      --green:   #2ecc71;
      --yellow:  #f39c12;
      --cyan:    #1abc9c;
    }

    html, body {
      height: 100%;
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--dark);
      color: var(--text);
    }

    /* ===== BACKGROUND ===== */
    body {
      background:
        radial-gradient(ellipse 100% 80% at 50% 0%, rgba(245,197,24,.12) 0%, transparent 70%),
        radial-gradient(ellipse 80% 50% at 20% 100%, rgba(26,188,156,.08) 0%, transparent 60%),
        var(--dark);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ===== HEADER ===== */
    header {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem 2rem;
      border-bottom: 1px solid var(--border);
      background: rgba(10,10,15,.9);
      backdrop-filter: blur(15px);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: .75rem;
      text-decoration: none;
    }

    .logo-icon {
      width: 46px; height: 46px;
      background: linear-gradient(135deg, var(--gold), #ffd84d);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.5rem;
      box-shadow: 0 0 25px rgba(245,197,24,.4);
    }

    .logo-text { font-size: 1.35rem; font-weight: 800; color: var(--text); letter-spacing: -.5px; }
    .logo-text span { color: var(--gold); }

    /* ===== MAIN WRAPPER ===== */
    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem 1.5rem;
    }

    /* ===== CADASTRO CARD ===== */
    .cadastro-wrapper {
      width: 100%;
      max-width: 520px;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .cadastro-heading {
      text-align: center;
    }

    .cadastro-heading h1 {
      font-size: 2rem;
      font-weight: 900;
      margin-bottom: .6rem;
      letter-spacing: -.02em;
    }

    .cadastro-heading p {
      color: var(--muted);
      font-size: .95rem;
      line-height: 1.6;
    }

    .cadastro-card {
      background: linear-gradient(135deg, var(--card) 0%, #1e1e2a 100%);
      border: 1.5px solid var(--border);
      border-radius: 18px;
      padding: 2.5rem 2.2rem;
      box-shadow: 0 20px 60px rgba(0,0,0,.5), 0 0 0 1px rgba(245,197,24,.08);
      backdrop-filter: blur(10px);
    }

    /* ===== FORM ===== */
    .form-group {
      display: flex;
      flex-direction: column;
      gap: .5rem;
      margin-bottom: 1.5rem;
    }

    .form-group label {
      font-size: .85rem;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .08em;
    }

    .input-wrap {
      position: relative;
    }

    .input-wrap .icon {
      position: absolute;
      left: 1.2rem;
      top: 50%;
      transform: translateY(-50%);
      font-size: 1.1rem;
      color: var(--muted);
      pointer-events: none;
      transition: color .2s;
    }

    .form-group input {
      width: 100%;
      background: var(--dark3);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 1rem 1.2rem 1rem 3.2rem;
      color: var(--text);
      font-size: .95rem;
      transition: all .3s;
      outline: none;
    }

    .form-group input:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 4px rgba(245,197,24,.15);
      background: rgba(245,197,24,.02);
    }

    .form-group input:valid:not(:placeholder-shown) {
      border-color: var(--green);
    }

    .form-group input::placeholder { color: var(--muted); }

    /* ===== PASSWORD STRENGTH ===== */
    .password-strength {
      display: flex;
      gap: .4rem;
      margin-top: .6rem;
    }

    .strength-bar {
      flex: 1;
      height: 5px;
      background: var(--dark3);
      border-radius: 3px;
      overflow: hidden;
    }

    .strength-fill {
      height: 100%;
      width: 0%;
      background: var(--red);
      transition: width .3s, background .3s;
      border-radius: 3px;
    }

    .strength-text {
      font-size: .75rem;
      color: var(--muted);
      margin-top: .4rem;
      display: none;
      font-weight: 600;
    }

    .strength-text.show { display: block; }

    /* ===== TERMS ===== */
    .terms-group {
      display: flex;
      align-items: flex-start;
      gap: .8rem;
      margin-bottom: 1.8rem;
      font-size: .85rem;
    }

    .terms-group input[type="checkbox"] {
      width: 18px;
      height: 18px;
      margin-top: .15rem;
      cursor: pointer;
      accent-color: var(--gold);
      flex-shrink: 0;
    }

    .terms-group label {
      color: var(--muted);
      cursor: pointer;
      line-height: 1.6;
    }

    .terms-group a {
      color: var(--gold);
      text-decoration: none;
      font-weight: 600;
    }

    .terms-group a:hover { text-decoration: underline; }

    /* ===== BUTTON ===== */
    .btn-cadastro {
      width: 100%;
      padding: 1rem;
      background: linear-gradient(135deg, var(--gold), var(--gold-dk));
      color: #000;
      font-size: 1rem;
      font-weight: 800;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      letter-spacing: .04em;
      transition: all .3s;
      box-shadow: 0 8px 25px rgba(245,197,24,.35);
      text-transform: uppercase;
    }

    .btn-cadastro:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 12px 35px rgba(245,197,24,.5);
    }

    .btn-cadastro:active:not(:disabled) { transform: translateY(0); }

    .btn-cadastro:disabled {
      opacity: .7;
      cursor: not-allowed;
    }

    /* ===== DIVIDER ===== */
    .divider {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin: 2rem 0;
      color: var(--muted);
      font-size: .8rem;
    }

    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ===== LOGIN LINK ===== */
    .login-row {
      text-align: center;
      font-size: .9rem;
      color: var(--muted);
    }

    .login-row a {
      color: var(--gold);
      font-weight: 700;
      text-decoration: none;
      transition: all .2s;
    }

    .login-row a:hover {
      color: #ffd84d;
      text-decoration: underline;
    }

    /* ===== BACK LINK ===== */
    .back-link {
      text-align: center;
    }

    .back-link a {
      color: var(--muted);
      font-size: .85rem;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: .4rem;
      transition: all .2s;
      font-weight: 600;
    }

    .back-link a:hover {
      color: var(--gold);
      transform: translateX(-4px);
    }

    /* ===== FOOTER ===== */
    footer {
      text-align: center;
      padding: 1.5rem;
      color: var(--muted);
      font-size: .78rem;
      border-top: 1px solid var(--border);
    }

    /* ===== ALERT ===== */
    .alert {
      padding: .8rem 1.2rem;
      border-radius: 12px;
      font-size: .85rem;
      margin-bottom: 1rem;
      display: none;
      align-items: center;
      gap: .6rem;
      font-weight: 600;
    }

    .alert.show { display: flex; }

    .alert.success {
      background: rgba(46,204,113,.15);
      border: 1px solid rgba(46,204,113,.3);
      color: var(--green);
    }

    .alert.error {
      background: rgba(231,76,60,.15);
      border: 1px solid rgba(231,76,60,.3);
      color: var(--red);
    }

    .alert.warning {
      background: rgba(243,156,18,.15);
      border: 1px solid rgba(243,156,18,.3);
      color: var(--yellow);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 480px) {
      .cadastro-card { padding: 1.8rem 1.5rem; }
      .cadastro-heading h1 { font-size: 1.6rem; }
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header>
    <a href="index.html" class="logo">
      <div class="logo-icon">🎬</div>
      <span class="logo-text">Cinema <span>Pro</span></span>
    </a>
  </header>

  <!-- MAIN -->
  <main>
    <div class="cadastro-wrapper">

      <div class="cadastro-heading">
        <h1>Criar conta</h1>
        <p>Junte-se à comunidade de projecionistas profissionais do Brasil</p>
      </div>

      <div class="cadastro-card">
        
        <div id="alertBox" class="alert"></div>

        <form id="cadastroForm" onsubmit="handleCadastro(event)">

          <div class="form-group">
            <label for="nome">Nome Completo</label>
            <div class="input-wrap">
              <span class="icon">👤</span>
              <input
                type="text"
                id="nome"
                name="nome"
                placeholder="Seu nome completo"
                required
                minlength="3"
                autocomplete="name"
              />
            </div>
          </div>

          <div class="form-group">
            <label for="email">E-mail Profissional</label>
            <div class="input-wrap">
              <span class="icon">✉️</span>
              <input
                type="email"
                id="email"
                name="email"
                placeholder="seu@email.com"
                required
                autocomplete="email"
              />
            </div>
          </div>

          <div class="form-group">
            <label for="password">Senha</label>
            <div class="input-wrap">
              <span class="icon">🔒</span>
              <input
                type="password"
                id="password"
                name="password"
                placeholder="Mínimo 8 caracteres"
                required
                minlength="8"
                autocomplete="new-password"
                oninput="checkPasswordStrength()"
              />
            </div>
            <div class="password-strength">
              <div class="strength-bar">
                <div class="strength-fill" id="strengthFill"></div>
              </div>
            </div>
            <span class="strength-text" id="strengthText"></span>
          </div>

          <div class="form-group">
            <label for="confirmPassword">Confirmar Senha</label>
            <div class="input-wrap">
              <span class="icon">🔐</span>
              <input
                type="password"
                id="confirmPassword"
                name="confirmPassword"
                placeholder="Confirme sua senha"
                required
                minlength="8"
                autocomplete="new-password"
              />
            </div>
          </div>

          <div class="terms-group">
            <input
              type="checkbox"
              id="terms"
              name="terms"
              required
            />
            <label for="terms">
              Concordo com os <a href="#">Termos de Serviço</a> e a <a href="#">Política de Privacidade</a>
            </label>
          </div>

          <button type="submit" class="btn-cadastro" id="submitBtn">
            ✓ Criar Minha Conta
          </button>

        </form>

        <div class="divider">ou</div>

        <div class="login-row">
          Já tem acesso?
          <a href="login.html">Faça login aqui</a>
        </div>
      </div>

      <div class="back-link">
        <a href="index.html">← Voltar para a página inicial</a>
      </div>

    </div>
  </main>

  <!-- FOOTER -->
  <footer>
    &copy; 2025 Cinema Pro Platform · Todos os direitos reservados
  </footer>

  <script>
    const form = document.getElementById('cadastroForm');
    const passwordInput = document.getElementById('password');
    const confirmPasswordInput = document.getElementById('confirmPassword');
    const submitBtn = document.getElementById('submitBtn');
    const alertBox = document.getElementById('alertBox');

    // Verificar força da senha
    function checkPasswordStrength() {
      const password = passwordInput.value;
      const strengthFill = document.getElementById('strengthFill');
      const strengthText = document.getElementById('strengthText');
      
      let strength = 0;
      let strengthLabel = '';
      let strengthColor = '';

      if (password.length >= 8) strength++;
      if (/[a-z]/.test(password)) strength++;
      if (/[A-Z]/.test(password)) strength++;
      if (/[0-9]/.test(password)) strength++;
      if (/[^a-zA-Z0-9]/.test(password)) strength++;

      const widthPercent = (strength / 5) * 100;
      strengthFill.style.width = widthPercent + '%';

      if (strength <= 1) {
        strengthColor = '#e74c3c';
        strengthLabel = 'Fraca';
      } else if (strength <= 2) {
        strengthColor = '#f39c12';
        strengthLabel = 'Média';
      } else if (strength <= 3) {
        strengthColor = '#3498db';
        strengthLabel = 'Boa';
      } else {
        strengthColor = '#2ecc71';
        strengthLabel = 'Forte';
      }

      strengthFill.style.background = strengthColor;
      strengthText.textContent = `Força: ${strengthLabel}`;
      strengthText.classList.add('show');
    }

    // Validar senhas iguais em tempo real
    confirmPasswordInput.addEventListener('input', () => {
      if (passwordInput.value && confirmPasswordInput.value && passwordInput.value !== confirmPasswordInput.value) {
        confirmPasswordInput.style.borderColor = 'var(--red)';
      } else {
        confirmPasswordInput.style.borderColor = '';
      }
    });

    // Mostrar alerta
    function showAlert(message, type) {
      alertBox.textContent = message;
      alertBox.className = `alert ${type} show`;
      setTimeout(() => {
        alertBox.classList.remove('show');
      }, 5000);
    }

    // Validar e enviar formulário
    function handleCadastro(e) {
      e.preventDefault();

      const nome = document.getElementById('nome').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = passwordInput.value;
      const confirmPassword = confirmPasswordInput.value;
      const termsChecked = document.getElementById('terms').checked;

      // Validações
      if (nome.length < 3) {
        showAlert('❌ Nome deve ter pelo menos 3 caracteres', 'error');
        return;
      }

      if (password.length < 8) {
        showAlert('❌ Senha deve ter pelo menos 8 caracteres', 'error');
        return;
      }

      if (password !== confirmPassword) {
        showAlert('❌ As senhas não coincidem', 'error');
        return;
      }

      if (!termsChecked) {
        showAlert('❌ Você deve concordar com os Termos de Serviço', 'error');
        return;
      }

      // Simular envio
      submitBtn.textContent = '⏳ Criando conta...';
      submitBtn.disabled = true;

      setTimeout(() => {
        showAlert('✅ Conta criada com sucesso! Redirecionando...', 'success');
        submitBtn.textContent = '✓ Criar Minha Conta';
        
        setTimeout(() => {
          window.location.href = 'login.html';
        }, 1500);
      }, 1500);
    }
  </script>

</body>
</html>
