<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cinema Pro Platform — Cadastro</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold: #f5c518;
      --gold-dk: #c9a10e;
      --dark: #0a0a0f;
      --dark2: #111118;
      --dark3: #1a1a24;
      --card: #16161f;
      --border: #2a2a3a;
      --text: #e8e8f0;
      --muted: #8888aa;
      --red: #e74c3c;
      --green: #2ecc71;
      --yellow: #f39c12;
    }

    html, body {
      height: 100%;
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(135deg, var(--dark) 0%, #1a0f2e 100%);
      color: var(--text);
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 1rem;
    }

    .container {
      width: 100%;
      max-width: 420px;
    }

    .card {
      background: linear-gradient(135deg, var(--card) 0%, #1e1e2a 100%);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 3rem 2rem;
      box-shadow: 0 20px 60px rgba(0,0,0,.5);
    }

    .logo-section {
      text-align: center;
      margin-bottom: 2rem;
    }

    .logo-icon {
      width: 60px;
      height: 60px;
      background: linear-gradient(135deg, var(--gold), #ffd84d);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      margin: 0 auto 1rem;
      box-shadow: 0 0 20px rgba(245,197,24,.3);
    }

    .logo-text {
      font-size: 1.5rem;
      font-weight: 900;
      margin-bottom: .5rem;
    }

    .logo-text span {
      color: var(--gold);
    }

    .subtitle {
      color: var(--muted);
      font-size: .95rem;
      margin-bottom: 2rem;
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    .form-group label {
      display: block;
      font-size: .9rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: .5rem;
      text-transform: uppercase;
      letter-spacing: .05em;
    }

    .form-group input {
      width: 100%;
      background: var(--dark3);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: .9rem 1rem;
      color: var(--text);
      font-size: .95rem;
      font-family: inherit;
      transition: all .2s;
    }

    .form-group input:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(245,197,24,.1);
      outline: none;
    }

    .form-group input.error {
      border-color: var(--red);
      box-shadow: 0 0 0 3px rgba(231,76,60,.1);
    }

    .form-group input.valid {
      border-color: var(--green);
      box-shadow: 0 0 0 3px rgba(46,204,113,.1);
    }

    .error-message {
      color: var(--red);
      font-size: .85rem;
      margin-top: .4rem;
      display: none;
    }

    .error-message.show {
      display: block;
    }

    .password-strength {
      font-size: .8rem;
      margin-top: .4rem;
      display: none;
    }

    .password-strength.show {
      display: block;
    }

    .strength-bar {
      width: 100%;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      margin-top: .3rem;
      overflow: hidden;
    }

    .strength-fill {
      height: 100%;
      width: 0%;
      transition: all .3s;
    }

    .btn {
      width: 100%;
      padding: 1rem;
      background: linear-gradient(135deg, var(--gold), var(--gold-dk));
      color: #000;
      border: none;
      border-radius: 10px;
      font-size: .95rem;
      font-weight: 700;
      cursor: pointer;
      transition: all .2s;
      margin-bottom: 1rem;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(245,197,24,.3);
    }

    .btn:disabled {
      opacity: .6;
      cursor: not-allowed;
    }

    .btn-secondary {
      background: var(--dark3);
      color: var(--text);
      border: 1px solid var(--border);
    }

    .btn-secondary:hover {
      border-color: var(--gold);
      color: var(--gold);
    }

    .links {
      text-align: center;
      margin-top: 1.5rem;
      font-size: .9rem;
    }

    .links a {
      color: var(--gold);
      text-decoration: none;
      transition: all .2s;
    }

    .links a:hover {
      color: #ffd84d;
    }

    .alert {
      padding: 1rem;
      border-radius: 10px;
      margin-bottom: 1.5rem;
      display: none;
      border-left: 4px solid;
    }

    .alert.show {
      display: block;
    }

    .alert-success {
      background: rgba(46,204,113,.1);
      border-left-color: var(--green);
      color: var(--green);
    }

    .alert-error {
      background: rgba(231,76,60,.1);
      border-left-color: var(--red);
      color: var(--red);
    }

    .footer {
      text-align: center;
      margin-top: 2rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--border);
      font-size: .85rem;
      color: var(--muted);
    }

    .footer strong {
      color: var(--gold);
    }

    @media (max-width: 480px) {
      .card {
        padding: 2rem 1.5rem;
      }

      .logo-icon {
        width: 50px;
        height: 50px;
        font-size: 1.5rem;
      }

      .logo-text {
        font-size: 1.2rem;
      }
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="card">
      <div class="logo-section">
        <div class="logo-icon">🎬</div>
        <div class="logo-text">Cinema <span>Pro</span></div>
        <p class="subtitle">Criar conta profissional</p>
      </div>

      <div class="alert alert-error" id="errorAlert"></div>
      <div class="alert alert-success" id="successAlert"></div>

      <form id="registerForm">
        <div class="form-group">
          <label for="name">Nome Completo</label>
          <input type="text" id="name" placeholder="Seu nome" required />
          <div class="error-message" id="nameError"></div>
        </div>

        <div class="form-group">
          <label for="email">E-mail</label>
          <input type="email" id="email" placeholder="seu@email.com" required />
          <div class="error-message" id="emailError"></div>
        </div>

        <div class="form-group">
          <label for="password">Senha</label>
          <input type="password" id="password" placeholder="••••••••" required />
          <div class="error-message" id="passwordError"></div>
          <div class="password-strength" id="passwordStrength">
            <div class="strength-bar">
              <div class="strength-fill" id="strengthFill"></div>
            </div>
            <span id="strengthText"></span>
          </div>
        </div>

        <div class="form-group">
          <label for="confirmPassword">Confirmar Senha</label>
          <input type="password" id="confirmPassword" placeholder="••••••••" required />
          <div class="error-message" id="confirmError"></div>
        </div>

        <button type="submit" class="btn" id="registerBtn">✓ Criar Conta</button>
      </form>

      <div class="links">
        <a href="login-real.html">Já tem conta? Entrar</a>
      </div>

      <div class="footer">
        <strong>Criado por Nelson Jesus</strong><br>
        Gerente da Plataforma Cinema Pro
      </div>
    </div>
  </div>

  <script>
    const API_URL = window.location.origin;

    // Validador de força de senha
    function checkPasswordStrength(password) {
      let strength = 0;
      if (password.length >= 8) strength++;
      if (/[a-z]/.test(password) && /[A-Z]/.test(password)) strength++;
      if (/\d/.test(password)) strength++;
      if (/[!@#$%^&*]/.test(password)) strength++;

      return strength;
    }

    // Monitorar força de senha
    document.getElementById('password').addEventListener('input', (e) => {
      const password = e.target.value;
      const strengthDiv = document.getElementById('passwordStrength');
      const strengthFill = document.getElementById('strengthFill');
      const strengthText = document.getElementById('strengthText');

      if (password.length === 0) {
        strengthDiv.classList.remove('show');
        return;
      }

      strengthDiv.classList.add('show');
      const strength = checkPasswordStrength(password);
      const percentage = (strength / 4) * 100;

      strengthFill.style.width = percentage + '%';

      const levels = ['Muito Fraca', 'Fraca', 'Média', 'Boa', 'Forte'];
      const colors = [
        'var(--red)',
        'var(--yellow)',
        'var(--yellow)',
        'var(--green)',
        'var(--green)'
      ];

      strengthText.textContent = levels[strength];
      strengthText.style.color = colors[strength];
      strengthFill.style.background = colors[strength];
    });

    // Validar confirmação de senha
    document.getElementById('confirmPassword').addEventListener('input', (e) => {
      const password = document.getElementById('password').value;
      const confirmPassword = e.target.value;
      const confirmError = document.getElementById('confirmError');

      if (confirmPassword && password !== confirmPassword) {
        confirmError.textContent = 'As senhas não conferem';
        confirmError.classList.add('show');
        e.target.classList.add('error');
      } else {
        confirmError.classList.remove('show');
        e.target.classList.remove('error');
        if (confirmPassword) {
          e.target.classList.add('valid');
        }
      }
    });

    // Enviar formulário
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      const registerBtn = document.getElementById('registerBtn');

      // Validações
      if (!name || !email || !password || !confirmPassword) {
        showError('Todos os campos são obrigatórios');
        return;
      }

      if (name.length < 3) {
        showError('Nome deve ter pelo menos 3 caracteres');
        return;
      }

      if (!email.includes('@')) {
        showError('Por favor, insira um e-mail válido');
        return;
      }

      if (password.length < 8) {
        showError('Senha deve ter pelo menos 8 caracteres');
        return;
      }

      if (password !== confirmPassword) {
        showError('As senhas não conferem');
        return;
      }

      registerBtn.disabled = true;
      registerBtn.textContent = '⏳ Criando conta...';

      try {
        const response = await fetch(`${API_URL}/api/register`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ name, email, password })
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || 'Erro ao cadastrar');
        }

        // Salvar token
        localStorage.setItem('token', data.token);
        localStorage.setItem('user', JSON.stringify(data.user));

        showSuccess(`✅ Bem-vindo, ${data.user.name}!`);
        
        setTimeout(() => {
          window.location.href = 'dashboard.html';
        }, 1500);

      } catch (error) {
        showError(error.message);
        registerBtn.disabled = false;
        registerBtn.textContent = '✓ Criar Conta';
      }
    });

    function showError(message) {
      const errorAlert = document.getElementById('errorAlert');
      errorAlert.textContent = message;
      errorAlert.classList.add('show');
      document.getElementById('successAlert').classList.remove('show');
    }

    function showSuccess(message) {
      const successAlert = document.getElementById('successAlert');
      successAlert.textContent = message;
      successAlert.classList.add('show');
      document.getElementById('errorAlert').classList.remove('show');
    }

    // Verificar se já está logado
    window.addEventListener('load', () => {
      const token = localStorage.getItem('token');
      if (token) {
        window.location.href = 'dashboard.html';
      }
    });
  </script>

</body>
</html>
