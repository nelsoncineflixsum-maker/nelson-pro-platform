<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nelson Pro | Cadastro Elite</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #0a0a0a; height: 100vh; display: flex; justify-content: center; align-items: center; }
        .reg-box { 
            background: #121212; padding: 40px; border-radius: 15px; 
            width: 400px; border: 1px solid #1a1a1a; text-align: center;
        }
        h2 { color: #fff; margin-bottom: 30px; font-weight: 300; }
        h2 b { color: #e50914; font-weight: 900; }
        input { 
            width: 100%; padding: 15px; margin-bottom: 15px; 
            background: #1a1a1a; border: 1px solid #333; 
            border-radius: 8px; color: white; 
        }
        button { 
            width: 100%; padding: 15px; background: #fff; color: #000; 
            border: none; border-radius: 8px; font-weight: bold; cursor: pointer; 
            transition: 0.3s;
        }
        button:hover { background: #e50914; color: #fff; }
        .back { margin-top: 20px; color: #555; font-size: 13px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="reg-box">
        <h2>CADASTRO <b>NELSON PRO</b></h2>
        <input type="text" id="nome" placeholder="Nome Completo">
        <input type="email" id="email" placeholder="Seu melhor E-mail">
        <input type="password" id="senha" placeholder="Crie uma Senha">
        <button onclick="cadastrar()">Cadastrar na Plataforma</button>
        <div class="back" onclick="window.location.href='login.html'">Já sou aluno? Voltar ao Login</div>
    </div>

    <script>
        async function cadastrar() {
            const name = document.getElementById('nome').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('senha').value;
            const response = await fetch('/api/auth/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, email, password })
            });
            if (response.ok) {
                alert('Nelson Pro: Cadastro realizado!');
                window.location.href = 'login.html';
            } else { alert('Erro ao cadastrar.'); }
        }
    </script>
</body>
</html>
